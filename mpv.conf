##################
# General Settings #
##################
vo                      = gpu-next    # Intel chips: libmpv recommended for better performance. Apple Silicon: gpu-next recommended
hwdec                   = auto
# icc-force-contrast    = 1000
vd-lavc-dr              = yes         # <default yes|no> Decode directly to VRAM; disable on some low-end Intel CPUs to greatly improve decoding speed
hr-seek-framedrop       = yes         # [set to no when using interpolation] Allow frame dropping when seeking (default yes). Disabling helps fix audio delay
gpu-shader-cache-dir    = "~~/_cache/shader" # Store/load compiled GLSL shader cache to improve startup performance
icc-cache-dir           = "~~/_cache/icc"    # Store/load 3D LUT from ICC profiles to speed up loading
hwdec-software-fallback = 60          # Maximize hardware decoding usage
opengl-pbo              = yes         # May help with 4K videos
# video-sync            = display-resample
# interpolation         = yes         # Only works when video-sync=display-resample
# tscale                = oversample  # Only works when interpolation is enabled
# include               = "~~/img-profiles.conf" # ~~ means mpv.conf directory
log-file                = "~/Downloads/output.log"
input-builtin-bindings  = no
script-opts-append      = modernz-language=zh
save-watch-history      = yes
save-position-on-quit   = yes
watch-later-options     = start,vid,aid,sid

##################
# Video Settings #
##################
# [fast]
# scale                     = bilinear
# dscale                    = bilinear
# dither                    = no
# correct-downscaling       = no
# linear-downscaling        = no
# sigmoid-upscaling         = no
# hdr-compute-peak          = no
# allow-delayed-peak-detect = yes

# [high-quality] (inherits default options)
# scale                 = ewa_lanczossharp
# hdr-peak-percentile   = 99.995
# hdr-contrast-recovery = 0.30

##################
# Window Settings #
##################
hidpi-window-scale      = no
border                  = yes         # Borderless window (removes Windows window decorations)
osc                     = no
idle                    = yes
title                   = "${filename}" # Window title shows current file name
force-window            = immediate   # Show window immediately without waiting for video to load
reset-on-next-file      = vf,af,audio-delay,sub-pos,sub-scale,sub-delay,sub-speed,sub-visibility,speed,video-zoom,video-rotate,video-pan-x,video-pan-y,panscan
geometry                = 50%:50%     # Start window centered
autofit-larger          = 100%x100%
cursor-autohide         = 1000        # Hide mouse after 1 second
keep-open               = yes         # Keep window open after playback ends
input-media-keys        = no          # Enable/disable OSX media keys
force-seekable          = yes
ytdl                    = yes
ytdl-raw-options-append = cookies-from-browser=edge

##################
# OSD Settings #
##################
osd-level=1
osd-bar=no
osd-on-seek              = msg-bar
osd-bar-h                = 2
osd-bar-border-size      = 0.2
osd-border-size          = 0
osd-font-size            = 40
osd-fractions            = yes
osd-playing-msg          = "${filename}"
osd-font                 = "Microsoft Yahei"
osd-font-size            = 24          # OSD font size (global; affects multiple displays)
osd-duration             = 2000
osd-playing-msg-duration = 3000

##################
# Playlist Settings #
##################
autocreate-playlist    = same        # <no|filter|same> Auto-fill playlist when opening a file
directory-mode         = ignore      # Ignore subfolders when opening directories
directory-filter-types = video,audio,image
video-exts             = 3g2,3gp,avi,flv,ivf,m2ts,m4v,mj2,mkv,mov,mp4,mpeg,mpg,ogv,rmvb,ts,webm,wmv,y4m
image-exts             = avif,bmp,gif,j2k,jp2,jpeg,jpg,jxl,png,svg,tga,tif,tiff,webp
audio-exts             = aac,ac3,aiff,ape,au,dts,eac3,flac,m4a,mka,mp3,oga,ogg,ogm,opus,thd,wav,wav,wma,wv

##################
# Audio Settings #
##################
audio-file-auto          = fuzzy                             
alang                    = en,eng,zh,chi
volume                   = 80
volume-max               = 200

##################
# Subtitle Settings #
##################
slang             = en,eng,zh,chi
sub-auto          = fuzzy 
sub-font-size     = 43
sub-shadow-offset = 0
sub-color         = '#F0FFFFFF'
sub-file-paths    = ass:srt:sub:subs:subtitles

##################
# Screenshot Settings #
##################
screenshot-format             = png
screenshot-jpeg-quality       = 100
screenshot-jpeg-source-chroma = no
screenshot-png-compression    = 5
screenshot-png-filter         = 0
screenshot-webp-lossless      = yes
screenshot-webp-quality       = 100
screenshot-webp-compression   = 3
screenshot-jxl-distance       = 0
screenshot-jxl-effort         = 5
screenshot-tag-colorspace     = yes
screenshot-high-bit-depth     = yes
screenshot-sw                 = no
screenshot-avif-pixfmt        = yuv420p10le
screenshot-template           = "~~desktop/%F-%wH-%wM-%wS"

##################
# uosc Settings #
##################
script-opts-append = uosc-languages=zh-hans
script-opts-append = uosc-autoload=yes
script-opts-append = uosc-opacity=curtain=0
script-opts-append = uosc-timeline_persistency=idle,audio

##################
# thumbfast Settings #
##################
script-opts-append = thumbfast-hwdec=yes
script-opts-append = thumbfast-max_height=200
script-opts-append = thumbfast-max_width=200
